<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens 🌍</title>
    <style>
        /* 1. 기본 초기화 및 폰트 세팅 (디자인 유지) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; color: #333; line-height: 1.5; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .app-header { margin-bottom: 25px; text-align: center; }
        .app-header h1 { font-size: 1.6rem; font-weight: 800; color: #111; }
        .app-header p { font-size: 0.95rem; color: #666; margin-top: 5px; word-break: keep-all; }

        /* 2. 카메라 버튼 및 로딩/알림 UI */
        .camera-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00); color: white;
            padding: 14px 28px; font-size: 1.05rem; font-weight: 700; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(245, 124, 0, 0.3);
            display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
        }
        #cameraInput { display: none; }
        #preview { max-width: 100%; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: none; }
        #loading { display: none; margin-top: 10px; font-size: 0.95rem; font-weight: 600; color: #f57c00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        #disclaimer {
            display: none; width: 100%; max-width: 600px; background-color: #fff3cd; color: #856404;
            padding: 12px 15px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; border: 1px solid #ffeeba;
        }

        /* 3. 결과 카드 디자인 */
        #resultContainer { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 15px; }
        .menu-card { background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .menu-card .title-ko { font-size: 1.15rem; font-weight: 800; color: #111; margin-bottom: 2px; }
        .menu-card .title-translated { font-size: 0.95rem; color: #666; font-weight: 500; margin-bottom: 8px; }
        
        .menu-card .price { font-weight: 800; font-size: 1.15rem; color: #e65100; margin-bottom: 10px; }
        .menu-card .price .exchange { font-size: 0.9rem; color: #777; font-weight: 500; }
        .menu-card .warning { background-color: #ffebee; color: #c62828; padding: 8px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
        
        .menu-card .desc { font-size: 0.9rem; color: #444; line-height: 1.6; margin-bottom: 12px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .menu-card .tags { font-size: 1.1rem; background-color: #f8f9fa; padding: 6px 10px; border-radius: 8px; display: inline-flex; gap: 6px; }
        .search-image-btn { display: inline-flex; align-items: center; padding: 8px 14px; font-size: 0.85rem; font-weight: 600; color: #555; background-color: #f1f3f5; border-radius: 20px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1 id="appTitle">MenuLens 🔍</h1>
        <p id="appSlogan">메뉴판을 카메라로 찍으면 정보를 알려드립니다.</p>
    </div>

    <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">
        📷 <span id="btnScan">메뉴 스캔하기</span>
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">

    <img id="preview" alt="Menu Photo Preview">
    <div id="loading">AI가 메뉴를 분석하고 있어요... ⏳</div>
    <div id="disclaimer">💡 설명은 참고용이며, 실제 식당 요리와 다를 수 있습니다.</div>
    
    <div id="resultContainer"></div>

    <script>
        // 기본 사용자 언어 및 목표 화폐 (한국인 기준)
// 🌍 1. 브라우저 언어/국가 감지 (예: 'ko-KR', 'en-US', 'en-GB')
        const userLocale = navigator.language || 'en-US';
        const langPrefix = userLocale.split('-')[0]; // 'en', 'ko' 등 앞 2자리만 추출

        // 🌍 2. 글로벌 화폐 매핑 사전 (전 세계 주요 여행객 99% 커버)
        const currencyMap = {
            // 아시아 
            'ko': 'KRW', 'ko-KR': 'KRW', // 한국
            'ja': 'JPY', 'ja-JP': 'JPY', // 일본
            'zh': 'CNY', 'zh-CN': 'CNY', // 중국
            'zh-TW': 'TWD',              // 대만
            'zh-HK': 'HKD',              // 홍콩
            'th': 'THB', 'th-TH': 'THB', // 태국
            'vi': 'VND', 'vi-VN': 'VND', // 베트남
            'id': 'IDR', 'id-ID': 'IDR', // 인도네시아
            'ms': 'MYR', 'ms-MY': 'MYR', // 말레이시아
            'tl': 'PHP', 'fil': 'PHP',   // 필리핀
            'hi': 'INR', 'hi-IN': 'INR', // 인도

            // 아메리카
            'en-US': 'USD',              // 미국
            'en-CA': 'CAD',              // 캐나다
            'es-MX': 'MXN',              // 멕시코
            'pt-BR': 'BRL',              // 브라질

            // 유럽 (유로존 및 비유로존)
            'en-GB': 'GBP',              // 영국
            'fr': 'EUR', 'fr-FR': 'EUR', // 프랑스 등 유로존
            'de': 'EUR', 'de-DE': 'EUR', // 독일
            'es': 'EUR', 'es-ES': 'EUR', // 스페인
            'it': 'EUR', 'it-IT': 'EUR', // 이탈리아
            'ru': 'RUB', 'ru-RU': 'RUB', // 러시아
            'tr': 'TRY', 'tr-TR': 'TRY', // 튀르키예

            // 오세아니아
            'en-AU': 'AUD',              // 호주
            'en-NZ': 'NZD',              // 뉴질랜드

            // 중동 / 기타
            'ar-AE': 'AED',              // 아랍에미리트(두바이)
            'ar-SA': 'SAR',              // 사우디아라비아
        };

        // 🌍 3. 목표 화폐 결정 로직 (매우 중요!)
        // 1순위: 'en-GB' 같은 디테일한 코드가 사전에 있는지 확인
        // 2순위: 못 찾으면 'ko' 같은 앞 2자리 언어 코드로 확인
        // 3순위: 다 없으면 전 세계 기준 통화인 'USD(달러)'로 고정
        const targetCurrency = currencyMap[userLocale] || currencyMap[langPrefix] || 'USD';

        const cameraInput = document.getElementById('cameraInput');
        const preview = document.getElementById('preview');
        const resultContainer = document.getElementById('resultContainer');
        const loading = document.getElementById('loading');
        const disclaimer = document.getElementById('disclaimer');

        // ==========================================
        // 1. 카메라 사진 업로드
        // ==========================================
        cameraInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            
            resultContainer.innerHTML = ''; 
            resultContainer.style.display = 'none';
            disclaimer.style.display = 'none';
            loading.style.display = 'block';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function() {
                const base64Image = reader.result.split(',')[1]; 
                analyzeMenuWithAI(base64Image);
            };
        });

        // ==========================================
        // 2. AI 호출 (초심플 로직)
        // ==========================================
        async function analyzeMenuWithAI(base64Data) {
            const url = '/api/analyze'; // ※ 본인의 서버 혹은 백엔드 주소로 유지
        

// 🔥 최종 업그레이드된 AI 프롬프트 (예외 방어 + 고밀도 음식 설명)
            const promptText = `
                You are a global food expert helper. Analyze this menu image. 
                Output locale: "${userLanguage}".
                Do NOT output my instructions or placeholders. Only output the actual extracted data.

                ---CARD_START---
                **OriginalName:** Extract ONLY the main local name.
                **Subtitles:** Extract other foreign names, descriptions, or calories (e.g., 2370 cal). If none, write "None".
                **TranslatedName:** Translation of the main name in "${userLanguage}".
                **CurrencyCode:** 3-letter currency code (e.g., USD, KRW, CNY). If no symbol is present, GUESS the most likely currency based on the language/context of the menu. If completely unknown, write "Unknown".
                **Price:** Extract the price. If there are multiple options/prices (e.g., "8 oz. Single 54 | Petite Twin Tails 52"), extract ALL of them exactly as written. If no price, write "None".
                **Description:** Explain the core ingredients, cooking method, and taste profile (e.g., texture, flavor) in an appetizing way. Must be concise. Max 2 sentences in "${userLanguage}".
                **Warning:** Allergies and religious restrictions. If none, write "None".
                **Tags:** Relevant emojis (e.g., 🌶️, 🥩).
                ---CARD_END---
            `;
            const requestBody = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const rawText = await response.text();
                const data = JSON.parse(rawText);
                const aiResultText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!aiResultText) throw new Error('AI 응답을 읽을 수 없습니다.');

                parseAndRender(aiResultText);

            } catch (error) {
                loading.style.display = 'none';
                resultContainer.innerHTML = `<p style="text-align:center; padding:20px; color:#d9534f;">앗! 분석 중 오류가 발생했어요.<br>${error.message}</p>`;
                resultContainer.style.display = 'flex';
            }
        }

        // ==========================================
        // 3. 화면에 그리기 & 환율 계산
        // ==========================================
        async function parseAndRender(rawText) {
            loading.style.display = 'none';
            disclaimer.style.display = 'block'; 
            resultContainer.style.display = 'flex'; 

            const cardTexts = rawText.split('---CARD_START---').filter(text => text.trim() !== '');

            for (const cardText of cardTexts) {
                const cleanedText = cardText.split('---CARD_END---')[0].trim();
                
                const titleOriginal = cleanedText.match(/\*\*OriginalName:\*\*\s*(.*)/)?.[1] || 'Unknown';
                const subtitles = cleanedText.match(/\*\*Subtitles:\*\*\s*(.*)/)?.[1] || 'None';
                const titleTranslated = cleanedText.match(/\*\*TranslatedName:\*\*\s*(.*)/)?.[1] || '';
                const currencyCode = cleanedText.match(/\*\*CurrencyCode:\*\*\s*(.*)/)?.[1] || 'Unknown';
                const priceRaw = cleanedText.match(/\*\*Price:\*\*\s*(.*)/)?.[1] || 'None';
                const desc = cleanedText.match(/\*\*Description:\*\*\s*(.*)/)?.[1] || '';
                const warning = cleanedText.match(/\*\*Warning:\*\*\s*(.*)/)?.[1] || 'None';
                const tags = cleanedText.match(/\*\*Tags:\*\*\s*(.*)/)?.[1] || '';


// --- 💰 글로벌 가격 + 실시간 환율 로직 ---
                let priceDisplay = `<div class="price" style="color:#999; font-size:0.9rem;">가격 정보 없음</div>`;
                
                if (priceRaw !== 'None') {
                    const hasText = /[a-zA-Z가-힣\|]/.test(priceRaw);
                    const localPrice = parseFloat(priceRaw.replace(/[^0-9.]/g, '')); 

                    // 사용자 국가의 통화 표기법을 자동으로 맞춰주는 포맷터 (예: $15.00, ¥1,500)
                    const currencyFormatter = new Intl.NumberFormat(userLanguage, {
                        style: 'currency',
                        currency: targetCurrency,
                        maximumFractionDigits: targetCurrency === 'KRW' || targetCurrency === 'JPY' ? 0 : 2
                    });

                    if (currencyCode !== 'Unknown' && currencyCode !== targetCurrency) {
                        try {
                            const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${currencyCode}`);
                            const exData = await res.json();
                            const rateToTarget = exData.rates[targetCurrency];
                            
                            // 1. 단일 가격일 경우 (환율 변환해서 표시)
                            if (rateToTarget && !hasText && !isNaN(localPrice)) {
                                const converted = localPrice * rateToTarget;
                                const formattedConverted = currencyFormatter.format(converted);
                                
                                priceDisplay = `<div class="price">${localPrice} ${currencyCode} <span class="exchange">(≈ ${formattedConverted})</span></div>`;
                            } 
                            // 2. 옵션/글자가 섞여 있는 경우 (환율 변환 불가, 원문 표시)
                            else {
                                priceDisplay = `<div class="price" style="font-size:1rem;">${priceRaw} ${currencyCode}</div>`;
                            }
                        } catch (e) {
                            console.error("환율 변환 실패", e);
                            priceDisplay = `<div class="price" style="font-size:1rem;">${priceRaw} ${currencyCode}</div>`;
                        }
                    } 
                    // 3. 이미 메뉴판과 사용자 화폐가 같은 경우 (예: 미국인이 미국 식당에서)
                    else if (currencyCode === targetCurrency && !hasText && !isNaN(localPrice)) {
                        priceDisplay = `<div class="price">${currencyFormatter.format(localPrice)}</div>`;
                    } 
                    // 4. 그 외 처리 불가 상황
                    else {
                        priceDisplay = `<div class="price" style="font-size:1rem;">${priceRaw}</div>`;
                    }
                }
                // --- ⚠️ 주의사항 로직 ---
                let warningDisplay = '';
                if (warning !== 'None') {
                    warningDisplay = `<div class="warning">⚠️ 주의: ${warning}</div>`;
                }

                // --- 📝 메뉴판 부제목 로직 ---
                let subtitlesDisplay = '';
                if (subtitles !== 'None') {
                    subtitlesDisplay = `<div style="font-size: 0.85rem; color: #888; margin-bottom: 8px;">${subtitles}</div>`;
                }

                // --- 🔍 구글 검색 URL ---
                const searchUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(titleOriginal + ' dish')}`;

                // --- 화면에 카드 그리기 ---
                const cardDiv = document.createElement('div');
                cardDiv.className = 'menu-card';
                cardDiv.innerHTML = `
                    <div class="title-ko">${titleOriginal}</div>
                    ${subtitlesDisplay}
                    ${titleTranslated ? `<div class="title-translated">${titleTranslated}</div>` : ''}
                    ${priceDisplay}
                    ${warningDisplay}
                    ${desc ? `<div class="desc">${desc}</div>` : ''}
                    <div class="card-footer">
                        ${tags ? `<div class="tags">${tags}</div>` : '<div></div>'}
                        <a href="${searchUrl}" target="_blank" class="search-image-btn">🔍 사진 보기</a>
                    </div>
                `;
                resultContainer.appendChild(cardDiv);
            }
        }
    </script>
</body>
</html>
