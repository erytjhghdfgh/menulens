<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens 🌍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-header">
        <h1 id="appTitle">MenuLens 🔍</h1>
        <p id="appSlogan">메뉴판을 카메라로 찍으면 정보를 알려드립니다.</p>
    </div>

    <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">
        📷 <span id="btnScan">메뉴 사진 찍기</span>
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">

    <img id="preview" alt="Menu Photo Preview">
    <div id="loading">AI가 메뉴를 분석하고 있어요... ⏳</div>
    <div id="disclaimer">💡 설명은 참고용이며, 실제 식당 요리와 다를 수 있습니다.</div>
    
    <div id="resultContainer"></div>

    <!-- 💡 마크다운 변환 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
