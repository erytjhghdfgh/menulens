<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens 🌍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-header">
        <h1 id="appTitle">MenuLens 🔍</h1>
        <p id="appSlogan">메뉴판을 카메라로 찍으면 정보를 알려드립니다.</p>
    </div>
<!-- 버튼 그룹 추가 -->
    <div class="action-buttons">
        <!-- 기존 카메라 버튼 -->
        <button class="action-btn camera-btn" onclick="document.getElementById('cameraInput').click()">
            📷 <span id="btnScan">카메라로 찍기</span>
        </button>
        <!-- 신규 갤러리 버튼 -->
        <button class="action-btn gallery-btn" onclick="document.getElementById('galleryInput').click()">
            🖼️ <span id="btnUpload">사진 불러오기</span>
        </button>
    </div>

    <!-- capture="environment"가 있으면 카메라 실행 -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <!-- capture 속성이 없으면 갤러리(파일 선택) 실행 -->
    <input type="file" id="galleryInput" accept="image/*" style="display: none;">


    <img id="preview" alt="Menu Photo Preview">
    <div id="loading">AI가 메뉴를 분석하고 있어요... ⏳</div>
    <div id="disclaimer">💡 설명은 참고용이며, 실제 식당 요리와 다를 수 있습니다.</div>
    
    <div id="resultContainer"></div>

    <!-- 💡 마크다운 변환 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
