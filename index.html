<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens 🌍</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; color: #333; line-height: 1.5; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .app-header { margin-bottom: 25px; text-align: center; }
        .app-header h1 { font-size: 1.6rem; font-weight: 800; color: #111; }
        .app-header p { font-size: 0.95rem; color: #666; margin-top: 5px; word-break: keep-all; }

        .camera-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00); color: white;
            padding: 14px 28px; font-size: 1.05rem; font-weight: 700; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(245, 124, 0, 0.3);
            display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
        }
        #cameraInput { display: none; }
        #preview { max-width: 100%; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: none; }
        #loading { display: none; margin-top: 10px; font-size: 0.95rem; font-weight: 600; color: #f57c00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        #disclaimer {
            display: none; width: 100%; max-width: 600px; background-color: #fff3cd; color: #856404;
            padding: 12px 15px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; border: 1px solid #ffeeba;
        }

        #resultContainer { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 15px; }
        .menu-card { background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .menu-card .title-ko { font-size: 1.15rem; font-weight: 800; color: #111; margin-bottom: 2px; }
        .menu-card .title-translated { font-size: 0.95rem; color: #666; font-weight: 500; margin-bottom: 8px; }
        
        .menu-card .price { font-weight: 800; font-size: 1.15rem; color: #e65100; margin-bottom: 10px; }
        .menu-card .price .exchange { font-size: 0.9rem; color: #777; font-weight: 500; }
        .menu-card .warning { background-color: #ffebee; color: #c62828; padding: 8px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
        
        .menu-card .desc { font-size: 0.9rem; color: #444; line-height: 1.6; margin-bottom: 12px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .menu-card .tags { font-size: 1.1rem; background-color: #f8f9fa; padding: 6px 10px; border-radius: 8px; display: inline-flex; gap: 6px; }
        .search-image-btn { display: inline-flex; align-items: center; padding: 8px 14px; font-size: 0.85rem; font-weight: 600; color: #555; background-color: #f1f3f5; border-radius: 20px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1 id="appTitle">MenuLens 🔍</h1>
        <p id="appSlogan">메뉴판을 카메라로 찍으면 정보를 알려드립니다.</p>
    </div>

    <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">
        📷 <span id="btnScan">메뉴 스캔하기</span>
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">

    <img id="preview" alt="Menu Photo Preview">
    <div id="loading">AI가 메뉴를 분석하고 있어요... ⏳</div>
    <div id="disclaimer">💡 설명은 참고용이며, 실제 식당 요리와 다를 수 있습니다.</div>
    
    <div id="resultContainer"></div>

    <script>
        // ==========================================
        // 1. 다국어 및 환율 설정
        // ==========================================
        const userLanguage = navigator.language || 'en';
        const langPrefix = userLanguage.substring(0, 2);

        const currencyMap = {
            'ko': { code: 'KRW', symbol: '₩' },
            'ja': { code: 'JPY', symbol: '¥' },
            'zh': { code: 'CNY', symbol: '¥' },
            'en': { code: 'USD', symbol: '$' },
            'de': { code: 'EUR', symbol: '€' },
            'fr': { code: 'EUR', symbol: '€' },
            'es': { code: 'EUR', symbol: '€' },
            'th': { code: 'THB', symbol: '฿' },
            'vi': { code: 'VND', symbol: '₫' },
        };
        const userCurrency = currencyMap[langPrefix] || currencyMap['en'];

        const originCurrencyToCode = {
            'KRW': 'KRW', '원': 'KRW', '₩': 'KRW',
            'JPY': 'JPY', '¥': 'JPY',
            'CNY': 'CNY',
            'USD': 'USD', '$': 'USD',
            'EUR': 'EUR', '€': 'EUR',
            'THB': 'THB', '฿': 'THB',
            'VND': 'VND', '₫': 'VND',
        };

        const rateCache = {};
        async function getExchangeRate(fromCode, toCode) {
            if (fromCode === toCode) return 1;
            const key = `${fromCode}_${toCode}`;
            if (rateCache[key]) return rateCache[key];
            try {
                const res = await fetch(`https://api.frankfurter.app/latest?from=${fromCode}&to=${toCode}`);
                const data = await res.json();
                const rate = data.rates?.[toCode];
                if (rate) rateCache[key] = rate;
                return rate || null;
            } catch (e) {
                return null;
            }
        }

        // ==========================================
        // 2. 카메라 업로드
        // ==========================================
        const cameraInput = document.getElementById('cameraInput');
        const preview = document.getElementById('preview');
        const resultContainer = document.getElementById('resultContainer');
        const loading = document.getElementById('loading');
        const disclaimer = document.getElementById('disclaimer');

        cameraInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            resultContainer.innerHTML = '';
            resultContainer.style.display = 'none';
            disclaimer.style.display = 'none';
            loading.style.display = 'block';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function() {
                const base64Image = reader.result.split(',')[1];
                analyzeMenuWithAI(base64Image);
            };
        });

        // ==========================================
        // 3. AI 분석 (사진 → AI → 바로 출력)
        // ==========================================
        async function analyzeMenuWithAI(base64Data) {
            const promptText = `
                You are a global food expert helper. Analyze this menu image.
                Output locale: "${userLanguage}".
                Do NOT output my instructions or placeholders. Only output the actual extracted data.

                For EACH menu item visible, output one block:

                ---CARD_START---
                **OriginalName:** Extract ONLY the main local name (e.g., 天然海蜇 or 설렁탕).
                **Subtitles:** Extract other foreign names/descriptions on the menu. If none, write "None".
                **TranslatedName:** Translation of the main name in "${userLanguage}".
                **OriginalCurrency:** Currency code or symbol shown on the menu (e.g., KRW, CNY, USD, ¥, 원). If none, write "None".
                **Price:** Extract only the number. If none, write "None".
                **Description:** Clean, appetizing description in "${userLanguage}". Max 2 sentences.
                **Warning:** Allergies and religious restrictions. If none, write "None".
                **Tags:** Relevant emojis (e.g., 🌶️, 🥩).
                ---CARD_END---
            `;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const rawText = await response.text();
                const data = JSON.parse(rawText);
                const aiResultText = data?.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!aiResultText) throw new Error('AI 응답을 읽을 수 없습니다.');

                await parseAndRender(aiResultText);

            } catch (error) {
                loading.style.display = 'none';
                resultContainer.innerHTML = `<p style="text-align:center; padding:20px; color:#d9534f;">앗! 분석 중 오류가 발생했어요.<br>${error.message}</p>`;
                resultContainer.style.display = 'flex';
            }
        }

        // ==========================================
        // 4. 파싱 + 환율 변환 + 렌더링
        // ==========================================
        async function parseAndRender(rawText) {
            loading.style.display = 'none';
            disclaimer.style.display = 'block';
            resultContainer.style.display = 'flex';

            const cardTexts = rawText.split('---CARD_START---').filter(text => text.includes('---CARD_END---'));

            for (const cardText of cardTexts) {
                const cleaned = cardText.split('---CARD_END---')[0].trim();

                const get = (field) =>
                    (cleaned.match(new RegExp(`\\*\\*${field}:\\*\\*\\s*(.+)`)) || [])[1]?.trim() || 'None';

                const titleOriginal   = get('OriginalName');
                const subtitles       = get('Subtitles');
                const titleTranslated = get('TranslatedName');
                const currencyRaw     = get('OriginalCurrency');
                const priceRaw        = get('Price');
                const desc            = get('Description');
                const warning         = get('Warning');
                const tags            = get('Tags');

                // --- 가격 + 환율 ---
                let priceDisplay = `<div class="price" style="color:#999; font-size:0.9rem;">가격 정보 없음</div>`;
                const priceNum = parseFloat(priceRaw.replace(/[^0-9.]/g, ''));

                if (priceRaw !== 'None' && !isNaN(priceNum)) {
                    const originCode = originCurrencyToCode[currencyRaw] || 'KRW';
                    const displayCurrency = currencyRaw !== 'None' ? currencyRaw : '';
                    const formattedOrigin = priceNum.toLocaleString();

                    let exchangeHTML = '';
                    if (originCode !== userCurrency.code) {
                        const rate = await getExchangeRate(originCode, userCurrency.code);
                        if (rate) {
                            const converted = priceNum * rate;
                            const formatted = converted < 10
                                ? converted.toFixed(2)
                                : Math.round(converted).toLocaleString();
                            exchangeHTML = `<span class="exchange">(≈ ${userCurrency.symbol}${formatted})</span>`;
                        }
                    }

                    priceDisplay = `<div class="price">${displayCurrency} ${formattedOrigin} ${exchangeHTML}</div>`;
                }

                // --- 주의사항 ---
                const warningDisplay = warning !== 'None'
                    ? `<div class="warning">⚠️ 주의: ${warning}</div>`
                    : '';

                // --- 부제목 ---
                const subtitlesDisplay = subtitles !== 'None'
                    ? `<div style="font-size:0.85rem; color:#888; margin-bottom:8px;">${subtitles}</div>`
                    : '';

                const searchUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(titleOriginal + ' dish')}`;

                const cardDiv = document.createElement('div');
                cardDiv.className = 'menu-card';
                cardDiv.innerHTML = `
                    <div class="title-ko">${titleOriginal}</div>
                    ${subtitlesDisplay}
                    ${titleTranslated !== 'None' ? `<div class="title-translated">${titleTranslated}</div>` : ''}
                    ${priceDisplay}
                    ${warningDisplay}
                    ${desc !== 'None' ? `<div class="desc">${desc}</div>` : ''}
                    <div class="card-footer">
                        ${tags !== 'None' ? `<div class="tags">${tags}</div>` : '<div></div>'}
                        <a href="${searchUrl}" target="_blank" class="search-image-btn">🔍 사진 보기</a>
                    </div>
                `;
                resultContainer.appendChild(cardDiv);
            }
        }
    </script>
</body>
</html>
