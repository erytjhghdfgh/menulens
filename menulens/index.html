<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuLens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div class="app-header">
        <h1 id="appTitle">MenuLens 🔍</h1>
        <p id="appSlogan">메뉴판을 카메라로 찍으면 정보를 알려드립니다.</p>
    </div>

    <!-- 메인 화면 삽입형 로그인/프로필 박스 -->
    <div id="authContainer" class="auth-container">
        <!-- 1) 로그인 전 화면 -->
        <div id="loggedOutView" class="auth-view">
            <p>🎁 구글 로그인하고 <strong>1일 무료 체험</strong>을 시작하세요!</p>
            <button id="btnGoogleLogin" class="google-login-btn">
                <span class="g-logo">G</span> 구글로 계속하기
            </button>
        </div>

        <!-- 2) 로그인 후 화면 (초기엔 숨김) -->
        <div id="loggedInView" class="auth-view" style="display: none;">
            <img id="userPhoto" src="" alt="프로필">
            <div class="user-info">
                <span id="userName"></span>님, 환영합니다!
                <div style="display: flex; gap: 8px;">
                    <button id="btnLogout" class="text-link-btn">로그아웃</button>
                    <button id="btnWithdraw" class="text-link-btn" style="color: #999;">회원탈퇴</button>
                </div>
            </div>
        </div>
    </div>
 
    <!-- 📱 스마트폰 목업 영상 영역 -->
    <div class="video-mockup">
        <video autoplay muted loop playsinline>
            <source src="demo-video.mp4" type="video/mp4">
        </video>
    </div>
 
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <input type="file" id="galleryInput" accept="image/*" style="display: none;">
 
    <img id="preview" alt="업로드된 메뉴 사진" style="display: none;">
    
    <div id="loading">AI가 메뉴를 분석하고 있어요... <span id="loadingPct"></span></div>
    <div id="disclaimer">💡 설명은 참고용이며, 실제 식당 요리와 다를 수 있습니다.</div>
    
    <div id="resultContainer"></div>

    <!-- 피드백 영역 -->
    <div id="feedbackContainer" style="display: none;">
        <hr class="feedback-divider">
        <div class="feedback-header">
           <p>💡 번역이 어색하거나 오류가 났나요?<br>잘못된 화면을 <strong>캡처(스크린샷)</strong>하여 첨부해 주시면 적극 수정하겠습니다!</p>
        </div>
        <button id="btnToggleFeedback" class="feedback-toggle-btn">📝 불편한 점 남기기</button>
        
        <div id="feedbackFormArea" class="feedback-form-area" style="display: none;">
            <textarea id="feedbackText" placeholder="여기에 피드백을 적어주세요..." maxlength="500"></textarea>
            <div class="feedback-actions">
                <label for="feedbackImgInput" class="feedback-img-label">사진 첨부</label>
                <input type="file" id="feedbackImgInput" accept="image/*" multiple style="display: none;">
                <div id="feedbackImgPreview" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;"></div>
                <button id="btnSubmitFeedback" class="feedback-submit-btn">보내기</button>
            </div>
        </div>
    </div>

    <!-- 하단 고정 바 -->
    <div class="bottom-sticky-bar">
        <div class="action-buttons">
            <button class="action-btn camera-btn" onclick="checkLoginAndAct('cameraInput')">
                📷 <span id="btnScan">카메라로 찍기</span>
            </button>
            <button class="action-btn gallery-btn" onclick="checkLoginAndAct('galleryInput')">
                🖼️ <span id="btnUpload">사진 불러오기</span>
            </button>
        </div>
    </div>

    <!-- ✨ 동의 모달 UI -->
    <div id="consentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:9999;
         justify-content:center; align-items:flex-end;">
        <div style="background:#fff; width:100%; max-width:480px; margin:0 auto;
                    border-radius:20px 20px 0 0; padding:28px 24px 40px; box-shadow:0 -8px 30px rgba(0,0,0,0.15);">
            
            <!-- 헤더 -->
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:2rem; margin-bottom:8px;">🔍</div>
                <h2 style="font-size:1.15rem; font-weight:800; color:#1a1a1a; margin-bottom:6px;">
                    MenuLens 시작하기
                </h2>
                <p style="font-size:0.85rem; color:#888; line-height:1.5;">
                    서비스 이용을 위해 아래 내용에 동의해 주세요.
                </p>
            </div>

            <!-- 전체 동의 -->
            <label style="display:flex; align-items:center; gap:12px;
                   background:#fff4eb; border:1.5px solid #FF7300; border-radius:12px;
                   padding:14px 16px; cursor:pointer; margin-bottom:12px;">
                <input type="checkbox" id="agreeAll" style="width:20px; height:20px; accent-color:#FF7300; cursor:pointer;">
                <span style="font-size:0.95rem; font-weight:700; color:#FF7300;">전체 동의</span>
            </label>

            <div style="border-top:1px solid #eee; margin-bottom:12px;"></div>

            <!-- 개별 동의 항목들 -->
            <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">

                <!-- 이용약관 -->
                <label style="display:flex; align-items:center; gap:12px;
                       background:#fafafa; border:1px solid #e8e8e8; border-radius:10px;
                       padding:12px 14px; cursor:pointer;">
                    <input type="checkbox" id="agreeTerms" style="width:18px; height:18px; accent-color:#FF7300; cursor:pointer;">
                    <div style="flex:1;">
                        <span style="font-size:0.88rem; font-weight:600; color:#333;">
                            <span style="color:#FF7300; font-size:0.75rem; font-weight:700;
                                   background:#fff4eb; padding:2px 6px; border-radius:4px; margin-right:6px;">필수</span>
                            이용약관 동의
                        </span>
                    </div>
                    <a href="terms.html" target="_blank"
                       style="font-size:0.78rem; color:#aaa; text-decoration:none; white-space:nowrap;"
                       onclick="event.stopPropagation()">보기 ›</a>
                </label>

                <!-- 개인정보처리방침 -->
                <label style="display:flex; align-items:center; gap:12px;
                       background:#fafafa; border:1px solid #e8e8e8; border-radius:10px;
                       padding:12px 14px; cursor:pointer;">
                    <input type="checkbox" id="agreePrivacy" style="width:18px; height:18px; accent-color:#FF7300; cursor:pointer;">
                    <div style="flex:1;">
                        <span style="font-size:0.88rem; font-weight:600; color:#333;">
                            <span style="color:#FF7300; font-size:0.75rem; font-weight:700;
                                   background:#fff4eb; padding:2px 6px; border-radius:4px; margin-right:6px;">필수</span>
                            개인정보 수집·이용 동의
                        </span>
                    </div>
                    <a href="privacy-policy.html" target="_blank"
                       style="font-size:0.78rem; color:#aaa; text-decoration:none; white-space:nowrap;"
                       onclick="event.stopPropagation()">보기 ›</a>
                </label>

                <!-- AI 학습 동의 (필수) -->
                <label style="display:flex; align-items:center; gap:12px;
                       background:#fafafa; border:1px solid #e8e8e8; border-radius:10px;
                       padding:12px 14px; cursor:pointer;">
                    <input type="checkbox" id="agreeAI" style="width:18px; height:18px; accent-color:#FF7300; cursor:pointer;">
                    <div style="flex:1;">
                        <div style="font-size:0.88rem; font-weight:600; color:#333; margin-bottom:3px;">
                            <span style="color:#FF7300; font-size:0.75rem; font-weight:700;
                                   background:#fff4eb; padding:2px 6px; border-radius:4px; margin-right:6px;">필수</span>
                            AI 학습 데이터 활용 동의
                        </div>
                        <div style="font-size:0.78rem; color:#aaa; line-height:1.4;">
                            메뉴판 사진을 서비스 개선·AI 학습에 익명으로 활용합니다.
                        </div>
                    </div>
                </label>
            </div>

            <!-- 동의 후 로그인 버튼 -->
            <button id="btnConsentConfirm"
                    style="width:100%; padding:16px; background:#FF7300; color:#fff;
                           border:none; border-radius:12px; font-size:1rem; font-weight:700;
                           cursor:pointer; opacity:0.4; pointer-events:none; transition:all 0.2s;">
                <span style="font-weight:900; font-size:1.1rem; margin-right:8px;">G</span>
                동의하고 구글로 계속하기
            </button>

            <button onclick="document.getElementById('consentModal').style.display='none';"
                    style="width:100%; margin-top:10px; padding:10px; background:none;
                           border:none; color:#aaa; font-size:0.85rem; cursor:pointer;">
                취소
            </button>
        </div>
    </div>

    <!-- 1. 로그인 상태 확인 함수 -->
    <script>
        window.isUserLoggedIn = false;

        function checkLoginAndAct(targetInputId) {
            if (window.isUserLoggedIn) {
                document.getElementById(targetInputId).click();
            } else {
                alert("무료 체험을 위해 먼저 로그인을 진행해 주세요! 🎁");
                document.getElementById('authContainer').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 동의 모달 - 구글 로그인 버튼 클릭 시 모달 표시
        document.getElementById('btnGoogleLogin').addEventListener('click', () => {
            document.getElementById('consentModal').style.display = 'flex';
        });

        // 전체 동의 체크박스
        document.getElementById('agreeAll').addEventListener('change', function() {
            ['agreeTerms', 'agreePrivacy', 'agreeAI'].forEach(id => {
                document.getElementById(id).checked = this.checked;
            });
            updateConsentButton();
        });

        // 개별 체크박스 변경 시
        ['agreeTerms', 'agreePrivacy', 'agreeAI'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                const all = ['agreeTerms', 'agreePrivacy', 'agreeAI'].every(i =>
                    document.getElementById(i).checked
                );
                document.getElementById('agreeAll').checked = all;
                updateConsentButton();
            });
        });

        // 필수 항목 체크 시 버튼 활성화
        function updateConsentButton() {
            const required = document.getElementById('agreeTerms').checked &&
                             document.getElementById('agreePrivacy').checked &&
                             document.getElementById('agreeAI').checked;
            const btn = document.getElementById('btnConsentConfirm');
            btn.style.opacity = required ? '1' : '0.4';
            btn.style.pointerEvents = required ? 'auto' : 'none';
        }

        // 동의 확인 버튼 클릭 → 실제 구글 로그인 실행
        document.getElementById('btnConsentConfirm').addEventListener('click', () => {
            const agreedAI = document.getElementById('agreeAI').checked;
            localStorage.setItem('menulens_agreed_ai', agreedAI ? 'true' : 'false');
            localStorage.setItem('menulens_agreed_terms', 'true');
            document.getElementById('consentModal').style.display = 'none';
            window.triggerGoogleLogin(); // Firebase module script의 함수 호출
        });
    </script>

    <!-- 2. 파이어베이스 및 로그인 처리 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, deleteUser, reauthenticateWithPopup } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwOlD5REeQ_mjf4M_osDEBRW7NbZvKuX8",
            authDomain: "menulens-80e04.firebaseapp.com",
            projectId: "menulens-80e04",
            storageBucket: "menulens-80e04.firebasestorage.app",
            messagingSenderId: "316749317909",
            appId: "1:316749317909:web:62b25be966ca99cb07cb1c",
            measurementId: "G-BHDDRNKBVT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // ✅ 동의 모달에서 호출하는 구글 로그인 함수
        window.triggerGoogleLogin = async function() {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("로그인 실패:", error);
            }
        };

        // 로그인 상태 감시
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.isUserLoggedIn = true;
                document.getElementById('loggedOutView').style.display = 'none';
                document.getElementById('loggedInView').style.display = 'flex';
                document.getElementById('userPhoto').src = user.photoURL;
                document.getElementById('userName').textContent = user.displayName;
            } else {
                window.isUserLoggedIn = false;
                document.getElementById('loggedInView').style.display = 'none';
                document.getElementById('loggedOutView').style.display = 'block';
            }
        });

        // 로그아웃
        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth);
        });

        // 피드백 전송 로직
        window.submitFeedback = async function() {
            const text = document.getElementById('feedbackText').value;
            const fileInput = document.getElementById('feedbackImgInput');
            const file = fileInput.files[0];

            if (!window.isUserLoggedIn) {
                alert("로그인 후 이용 가능합니다.");
                return;
            }
            if (!text.trim() && !file) {
                alert("내용이나 사진을 첨부해 주세요.");
                return;
            }

            try {
                let imageUrl = "";
                if (file) {
                    const storageRef = ref(storage, 'feedbacks/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                await addDoc(collection(db, "feedbacks"), {
                    content: text,
                    photoUrl: imageUrl,
                    user: auth.currentUser.email,
                    createdAt: serverTimestamp()
                });

                alert("소중한 피드백 고맙습니다! 적극 반영하겠습니다.");
                document.getElementById('feedbackText').value = '';
                fileInput.value = '';
                document.getElementById('feedbackImgName').textContent = '';
                document.getElementById('feedbackFormArea').style.display = 'none';
                document.getElementById('btnToggleFeedback').style.display = 'none';
                document.getElementById('feedbackContainer').innerHTML = 
                    '<p style="text-align:center; color:#888; padding:10px;">✅ 피드백이 전송되었습니다. 감사합니다!</p>';
            } catch (error) {
                console.error("전송 중 오류 발생:", error);
                alert("전송에 실패했습니다. 다시 시도해 주세요.");
            }
        };

        // 회원탈퇴
        document.getElementById('btnWithdraw').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;

            if (confirm("정말로 탈퇴하시겠습니까? 모든 개인정보가 삭제됩니다.")) {
                try {
                    // 1. 재인증
                    await reauthenticateWithPopup(user, provider);

                    // 2. valid_menus 개인정보 익명화 (이미지는 보존)
                    const menuQuery = query(
                        collection(db, "valid_menus"),
                        where("uid", "==", user.uid)
                    );
                    const menuSnapshot = await getDocs(menuQuery);
                    const menuUpdates = menuSnapshot.docs.map(d =>
                        updateDoc(doc(db, "valid_menus", d.id), {
                            uid: null,
                            userEmail: null
                        })
                    );
                    await Promise.all(menuUpdates);

                    // 3. feedbacks 개인정보 익명화
                    const feedbackQuery = query(
                        collection(db, "feedbacks"),
                        where("user", "==", user.email)
                    );
                    const feedbackSnapshot = await getDocs(feedbackQuery);
                    const feedbackUpdates = feedbackSnapshot.docs.map(d =>
                        updateDoc(doc(db, "feedbacks", d.id), {
                            user: null
                        })
                    );
                    await Promise.all(feedbackUpdates);

                    // 4. Firebase Auth 계정 삭제
                    await deleteUser(user);

                    alert("회원 탈퇴가 완료되었습니다.");
                    window.location.reload();

                } catch (error) {
                    console.error("탈퇴 실패:", error);
                    if (error.code === 'auth/popup-closed-by-user') {
                        alert("재인증 창이 닫혔습니다. 탈퇴를 취소합니다.");
                    } else {
                        alert("탈퇴 처리 중 오류가 발생했습니다. 다시 시도해 주세요.");
                    }
                }
            }
        });

        // 정상적인 메뉴판 사진 파이어베이스 저장
        window.saveValidMenuToFirebase = async function(file) {
            if (!window.isUserLoggedIn || !auth.currentUser) return;

            try {
                const storageRef = ref(storage, 'valid_menus/' + auth.currentUser.uid + '_' + Date.now() + "_" + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                const imageUrl = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, "valid_menus"), {
                    imageUrl: imageUrl,
                    userEmail: auth.currentUser.email,
                    uid: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });

                console.log("✅ 정상 메뉴판 사진 자동 저장 완료");
            } catch (error) {
                console.error("🚨 메뉴판 사진 자동 저장 실패:", error);
            }
        };

    </script>

    <script src="script.js"></script>
</body>
</html>
