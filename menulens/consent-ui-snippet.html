<!-- =============================================
  ✨ Consent Modal UI — i18n (ko/en/zh/ja/fr/es)
     Add just before closing </body> tag
  ============================================= -->
<div id="consentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:9999;
     justify-content:center; align-items:flex-end;">
    <div style="background:#fff; width:100%; max-width:480px; margin:0 auto;
                border-radius:20px 20px 0 0; padding:28px 24px 40px; box-shadow:0 -8px 30px rgba(0,0,0,0.15);">

        <!-- Header -->
        <div style="text-align:center; margin-bottom:20px;">
            <div style="font-size:2rem; margin-bottom:8px;">🔍</div>
            <h2 id="cm-title" style="font-size:1.15rem; font-weight:800; color:#1a1a1a; margin-bottom:6px;"></h2>
            <p  id="cm-subtitle" style="font-size:0.85rem; color:#888; line-height:1.5;"></p>
        </div>

        <!-- Agree to All -->
        <label id="agreeAllLabel" style="display:flex; align-items:center; gap:12px;
               background:#fff4eb; border:1.5px solid #FF7300; border-radius:12px;
               padding:14px 16px; cursor:pointer; margin-bottom:12px; transition:all 0.2s;">
            <input type="checkbox" id="agreeAll" style="width:20px; height:20px; accent-color:#FF7300; cursor:pointer;">
            <span id="cm-agreeAll" style="font-size:0.95rem; font-weight:700; color:#FF7300;"></span>
        </label>

        <!-- Divider -->
        <div style="border-top:1px solid #eee; margin-bottom:12px;"></div>

        <!-- Individual consent items -->
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">

            <!-- Terms of Service -->
            <label style="display:flex; align-items:center; gap:12px;
                   background:#fafafa; border:1px solid #e8e8e8; border-radius:10px;
                   padding:12px 14px; cursor:pointer;">
                <input type="checkbox" id="agreeTerms" style="width:18px; height:18px; accent-color:#FF7300; cursor:pointer;">
                <div style="flex:1;">
                    <span style="font-size:0.88rem; font-weight:600; color:#333;">
                        <span id="cm-badge-required-terms" style="color:#FF7300; font-size:0.75rem; font-weight:700;
                               background:#fff4eb; padding:2px 6px; border-radius:4px; margin-right:6px;"></span>
                        <span id="cm-terms-label"></span>
                    </span>
                </div>
                <a id="cm-terms-link" href="terms.html" target="_blank"
                   style="font-size:0.78rem; color:#aaa; text-decoration:none; white-space:nowrap;"
                   onclick="event.stopPropagation()"></a>
            </label>

            <!-- Privacy Policy -->
            <label style="display:flex; align-items:center; gap:12px;
                   background:#fafafa; border:1px solid #e8e8e8; border-radius:10px;
                   padding:12px 14px; cursor:pointer;">
                <input type="checkbox" id="agreePrivacy" style="width:18px; height:18px; accent-color:#FF7300; cursor:pointer;">
                <div style="flex:1;">
                    <span style="font-size:0.88rem; font-weight:600; color:#333;">
                        <span id="cm-badge-required-privacy" style="color:#FF7300; font-size:0.75rem; font-weight:700;
                               background:#fff4eb; padding:2px 6px; border-radius:4px; margin-right:6px;"></span>
                        <span id="cm-privacy-label"></span>
                    </span>
                </div>
                <a id="cm-privacy-link" href="privacy-policy.html" target="_blank"
                   style="font-size:0.78rem; color:#aaa; text-decoration:none; white-space:nowrap;"
                   onclick="event.stopPropagation()"></a>
            </label>

            <!-- AI Training Consent -->
            <label style="display:flex; align-items:center; gap:12px;
                   background:#fafafa; border:1px solid #e8e8e8; border-radius:10px;
                   padding:12px 14px; cursor:pointer;">
                <input type="checkbox" id="agreeAI" style="width:18px; height:18px; accent-color:#FF7300; cursor:pointer;">
                <div style="flex:1;">
                    <div style="font-size:0.88rem; font-weight:600; color:#333; margin-bottom:3px;">
                        <span id="cm-badge-optional" style="color:#888; font-size:0.75rem; font-weight:700;
                               background:#f0f0f0; padding:2px 6px; border-radius:4px; margin-right:6px;"></span>
                        <span id="cm-ai-label"></span>
                    </div>
                    <div id="cm-ai-desc" style="font-size:0.78rem; color:#aaa; line-height:1.4;"></div>
                </div>
            </label>
        </div>

        <!-- Confirm & Sign In Button -->
        <button id="btnConsentConfirm"
                style="width:100%; padding:16px; background:#FF7300; color:#fff;
                       border:none; border-radius:12px; font-size:1rem; font-weight:700;
                       cursor:pointer; opacity:0.4; pointer-events:none; transition:all 0.2s;">
            <span style="font-weight:900; color:#fff; font-size:1.1rem; margin-right:8px;">G</span>
            <span id="cm-confirm-btn"></span>
        </button>

        <button id="cm-cancel-btn"
                onclick="document.getElementById('consentModal').style.display='none';"
                style="width:100%; margin-top:10px; padding:10px; background:none;
                       border:none; color:#aaa; font-size:0.85rem; cursor:pointer;">
        </button>
    </div>
</div>

// =============================================

        subtitle:     'Please review and agree to the following before continuing.',
        agreeAll:     'Agree to All',

        privacyLabel: '同意隐私政策',
        aiLabel:      '同意 AI 训练数据使用',
        aiDesc:       '菜单照片将以匿名方式用于改进服务和训练 AI 模型。',
        viewLink:     '查看 ›',
        confirmBtn:   '同意并通过 Google 继续',
        cancelBtn:    '取消',
    },
    ja: {
        title:        'MenuLens を始める',
        subtitle:     '続行する前に以下の内容をご確認の上、同意してください。',
        agreeAll:     'すべてに同意する',
        required:     '必須',
        optional:     '任意',
        termsLabel:   '利用規約に同意する',
        privacyLabel: 'プライバシーポリシーに同意する',
        aiLabel:      'AI 学習データ利用に同意する',
        aiDesc:       'メニュー写真はサービス改善・AI 学習に匿名で使用されることがあります。',
        viewLink:     '見る ›',

    fr: {
        title:        'Commencer avec MenuLens',
        subtitle:     'Veuillez lire et accepter les conditions suivantes pour continuer.',
        agreeAll:     'Tout accepter',
        required:     'Obligatoire',
        optional:     'Facultatif',
        termsLabel:   "Accepter les conditions d'utilisation",
        privacyLabel: 'Accepter la politique de confidentialité',
        aiLabel:      "Accepter l'utilisation des données pour l'IA",
        aiDesc:       'Les photos de menus peuvent être utilisées de manière anonyme pour améliorer le service et entraîner des modèles IA.',
        viewLink:     'Voir ›',
        confirmBtn:   'Accepter et continuer avec Google',
        cancelBtn:    'Annuler',
    },
    es: {
        title:        'Comenzar con MenuLens',
        subtitle:     'Por favor, lee y acepta lo siguiente antes de continuar.',
        agreeAll:     'Aceptar todo',
        required:     'Obligatorio',
        optional:     'Opcional',
        termsLabel:   'Aceptar los términos de servicio',
        privacyLabel: 'Aceptar la política de privacidad',
        aiLabel:      'Aceptar el uso de datos para IA',
        aiDesc:       'Las fotos de menús podrán usarse de forma anónima para mejorar el servicio y entrenar modelos de IA.',
        viewLink:     'Ver ›',
        confirmBtn:   'Aceptar y continuar con Google',
        cancelBtn:    'Cancelar',
    },
};

// =============================================
// ✨ Detect browser language & apply strings
// =============================================
function getConsentLang() {
    const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    if (lang.startsWith('ko')) return 'ko';
    if (lang.startsWith('zh')) return 'zh';
    if (lang.startsWith('ja')) return 'ja';
    if (lang.startsWith('fr')) return 'fr';
    if (lang.startsWith('es')) return 'es';
    return 'en'; // fallback
}

function applyConsentI18n() {
    const t = CM_I18N[getConsentLang()];
    document.getElementById('cm-title').textContent                   = t.title;
    document.getElementById('cm-subtitle').textContent                = t.subtitle;
    document.getElementById('cm-agreeAll').textContent                = t.agreeAll;
    document.getElementById('cm-badge-required-terms').textContent    = t.required;
    document.getElementById('cm-badge-required-privacy').textContent  = t.required;
    document.getElementById('cm-badge-optional').textContent          = t.optional;
    document.getElementById('cm-terms-label').textContent             = t.termsLabel;
    document.getElementById('cm-privacy-label').textContent           = t.privacyLabel;
    document.getElementById('cm-ai-label').textContent                = t.aiLabel;
    document.getElementById('cm-ai-desc').textContent                 = t.aiDesc;
    document.getElementById('cm-terms-link').textContent              = t.viewLink;
    document.getElementById('cm-privacy-link').textContent            = t.viewLink;
    document.getElementById('cm-confirm-btn').textContent             = t.confirmBtn;
    document.getElementById('cm-cancel-btn').textContent              = t.cancelBtn;
}

// Apply on load
applyConsentI18n();

// =============================================
// ✨ Modal logic
// =============================================

// Intercept Google Sign-In button → show consent modal first
document.getElementById('btnGoogleLogin').addEventListener('click', (e) => {
    e.stopImmediatePropagation();
    applyConsentI18n(); // re-apply in case language changed
    document.getElementById('consentModal').style.display = 'flex';
}, true);

// Agree to All
document.getElementById('agreeAll').addEventListener('change', function () {
    ['agreeTerms', 'agreePrivacy', 'agreeAI'].forEach(id => {
        document.getElementById(id).checked = this.checked;
    });
    updateConsentButton();
});

// Individual checkboxes
['agreeTerms', 'agreePrivacy', 'agreeAI'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
        const all = ['agreeTerms', 'agreePrivacy', 'agreeAI'].every(i => document.getElementById(i).checked);
        document.getElementById('agreeAll').checked = all;
        updateConsentButton();
    });
});

// Enable confirm button only when required items are checked
function updateConsentButton() {
    const required = document.getElementById('agreeTerms').checked &&
                     document.getElementById('agreePrivacy').checked;
    const btn = document.getElementById('btnConsentConfirm');
    btn.style.opacity       = required ? '1'    : '0.4';
    btn.style.pointerEvents = required ? 'auto' : 'none';
}

// Confirm → save consent & trigger Google login
document.getElementById('btnConsentConfirm').addEventListener('click', () => {
    const agreedAI = document.getElementById('agreeAI').checked;
    localStorage.setItem('menulens_agreed_ai',    agreedAI ? 'true' : 'false');
    localStorage.setItem('menulens_agreed_terms', 'true');
    document.getElementById('consentModal').style.display = 'none';
    window.triggerGoogleLogin();
});
</script>
